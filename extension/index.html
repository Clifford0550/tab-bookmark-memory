<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Out</title>

  <!-- Google Fonts: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body data-view="tabs">
<div class="container">



  <!-- ================================================================
       HEADER — greeting on the left
       ================================================================ -->
  <header>
    <div class="header-left">
      <!-- "Good afternoon" — written by getGreeting() in app.js -->
      <h1 id="greeting"></h1>
      <!-- "Friday, April 4, 2026" — written by getDateDisplay() in app.js -->
      <div class="date" id="dateDisplay"></div>
    </div>
    <div class="theme-switcher" id="themeSwitcher" role="radiogroup" aria-label="主题">
      <button class="theme-swatch theme-typesys is-active" data-theme="typesys" title="TypeSys 默认 — 沙绿森林" aria-label="TypeSys"></button>
      <button class="theme-swatch theme-warm"               data-theme="warm"    title="Roughcut 暖橙 — 奶油 + 砖红"    aria-label="Roughcut Warm"></button>
      <button class="theme-swatch theme-dark"               data-theme="dark"    title="深色模式"                       aria-label="Dark"></button>
    </div>
  </header>

  <!-- ================================================================
       TAB OUT DUPES BANNER — appears when you have extra Tab Out tabs open
       Hidden by default; app.js shows it when dupeTabOutCount > 1
       ================================================================ -->
  <div class="tab-cleanup-banner" id="tabOutDupeBanner" style="display:none">
    <div class="tab-cleanup-left">
      <div class="tab-cleanup-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" />
        </svg>
      </div>
      <div class="tab-cleanup-text">
        你开了 <strong id="tabOutDupeCount"></strong> 个 Tab Bookmark 标签页，只留这一个吧？
      </div>
    </div>
    <button class="tab-cleanup-btn" data-action="close-tabout-dupes">关掉多余的</button>
  </div>

  <!-- ================================================================
       VIEW TABS — switch between "Open Tabs" dashboard and Bookmarks
       ================================================================ -->
  <nav class="view-tabs" id="viewTabs">
    <button class="view-tab is-active" data-view="tabs">浏览器标签</button>
    <button class="view-tab" data-view="bookmarks">整理收藏夹</button>
    <button class="view-tab" data-view="history">近期足迹</button>
    <button class="view-tab" data-view="review">🎲 随机回忆</button>
  </nav>

  <!-- ================================================================
       MAIN CONTENT AREA — two-column layout
       Left: open tabs (domain/mission cards)
       Right: saved for later checklist
       The right column only renders when it has items (JS controls this)
       ================================================================ -->
  <div class="dashboard-columns view-pane is-active" id="dashboardColumns" data-view="tabs">

    <!-- LEFT COLUMN: Open tabs -->
    <div class="active-section" id="openTabsSection" style="display:none">
      <div class="section-header">
        <h2 id="openTabsSectionTitle">Right now</h2>
        <div class="section-line"></div>
        <div class="section-count" id="openTabsSectionCount"></div>
      </div>
      <div class="missions" id="openTabsMissions"></div>
    </div>

    <!-- RIGHT COLUMN: Saved for Later checklist -->
    <div class="deferred-column" id="deferredColumn" style="display:none">
      <div class="section-header">
        <h2>Saved for later</h2>
        <div class="section-line"></div>
        <div class="section-count" id="deferredCount"></div>
      </div>

      <!-- Active checklist items — injected by renderDeferredList() in app.js -->
      <div class="deferred-list" id="deferredList"></div>

      <!-- Empty state — shown when no active deferred tabs -->
      <div class="deferred-empty" id="deferredEmpty" style="display:none">
        Nothing saved. Living in the moment.
      </div>

      <!-- Archive section — collapsed by default -->
      <div class="deferred-archive" id="deferredArchive" style="display:none">
        <button class="archive-toggle" id="archiveToggle">
          <svg class="archive-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" /></svg>
          Archive
          <span class="archive-count" id="archiveCount"></span>
        </button>
        <div class="archive-body" id="archiveBody" style="display:none">
          <input type="text" class="archive-search" id="archiveSearch" placeholder="Search archived tabs...">
          <div class="archive-list" id="archiveList"></div>
        </div>
      </div>
    </div>

  </div><!-- end .dashboard-columns -->

  <!-- ================================================================
       整理收藏夹 — Chrome bookmarks organizer
       Lives in its own view tab; app.js loads on first switch.
       ================================================================ -->
  <div class="bm-section view-pane" id="bmSection" data-view="bookmarks">
    <div class="section-header">
      <h2>整理收藏夹</h2>
      <div class="section-line"></div>
      <div class="section-count" id="bmCount"></div>
      <button class="bm-refresh" id="bmRefresh" title="刷新">↻</button>
    </div>

    <!-- Mode toggle: 时光机 (retrospective) vs 浏览整理 (organize) -->
    <div class="bm-mode-toggle">
      <button class="bm-mode-btn is-active" data-mode="timemachine">🕰 时光机</button>
      <button class="bm-mode-btn" data-mode="organize">🗂 浏览整理</button>
    </div>

    <!-- TIME MACHINE VIEW: scrollable strip of period cards with CTA -->
    <div class="bm-tm-view" id="bmTmView">
      <div class="bm-tm-intro" id="bmTmIntro"></div>
      <div class="bm-tm-controls">
        <span class="bm-tm-controls-label">每段时长</span>
        <select class="bm-select" id="bmTmWindow">
          <option value="3">3 个月</option>
          <option value="6" selected>6 个月</option>
          <option value="12">12 个月</option>
        </select>
      </div>
      <div class="bm-tm-strip" id="bmTmStrip"></div>
      <div class="bm-tm-status" id="bmTmStatus"></div>
    </div>

    <!-- ORGANIZE VIEW: existing toolbar + filters + lanes (hidden by default) -->
    <div class="bm-org-view" id="bmOrgView" style="display:none">

      <!-- Period scope banner — appears when entered via 时光机 CTA -->
      <div class="bm-period-banner" id="bmPeriodBanner" style="display:none"></div>

    <!-- Toolbar: filters + sort + folder filter -->
    <div class="bm-toolbar">
      <button class="bm-filter is-active" data-filter="all">全部 <span class="bm-pill" id="bmAllCount"></span></button>
      <button class="bm-filter" data-filter="duplicates">重复 <span class="bm-pill" id="bmDupCount"></span></button>
      <button class="bm-filter" data-filter="dead">失效 <span class="bm-pill" id="bmDeadCount"></span></button>
      <button class="bm-filter age-pill age-tier-1y" data-filter="age-1y">1 年+ <span class="bm-pill" id="bmAge1yCount"></span></button>
      <button class="bm-filter age-pill age-tier-2y" data-filter="age-2y">2 年+ <span class="bm-pill" id="bmAge2yCount"></span></button>
      <button class="bm-filter age-pill age-tier-3y" data-filter="age-3y">3 年+ <span class="bm-pill" id="bmAge3yCount"></span></button>
      <button class="bm-filter" data-filter="empty-folders">空文件夹 <span class="bm-pill" id="bmEmptyCount"></span></button>

      <div class="bm-spacer"></div>

      <select class="bm-select" id="bmSort" title="排序">
        <option value="folder">按文件夹</option>
        <option value="date-desc">最新优先</option>
        <option value="date-asc">最老优先</option>
        <option value="domain">按域名</option>
      </select>
      <select class="bm-select" id="bmFolderFilter" title="文件夹筛选">
        <option value="">全部文件夹</option>
      </select>
      <button class="bm-bulk" id="bmDedupeBtn" title="每组重复保留最早一条，删其余" style="display:none">
        一键去重
      </button>
      <button class="bm-bulk" id="bmClearEmptyBtn" title="删除所有空文件夹（含递归空的）" style="display:none">
        一键清空空文件夹
      </button>
    </div>

    <!-- Selection action bar — appears when 1+ items checked -->
    <div class="bm-selection-bar" id="bmSelectionBar" style="display:none">
      <span class="bm-sel-count" id="bmSelCount">已选 0 项</span>
      <button class="bm-sel-clear" id="bmSelClear" title="取消选择">取消</button>
      <div class="bm-sel-spacer"></div>
      <select class="bm-select" id="bmBulkMoveSelect" title="批量移动到文件夹">
        <option value="">批量移动到…</option>
      </select>
      <button class="bm-bulk" id="bmBulkDeleteBtn">删除选中</button>
    </div>

    <!-- Folder TOC — sticky horizontal pill nav, only visible when sort=folder -->
    <nav class="bm-folder-nav" id="bmFolderNav" style="display:none"></nav>

    <div class="bm-list" id="bmList"></div>
    <div class="bm-status" id="bmStatus"></div>

    </div><!-- end .bm-org-view -->
  </div>

  <!-- ================================================================
       近期足迹 — Browser History insights (last N days)
       ================================================================ -->
  <div class="hist-section view-pane" id="histSection" data-view="history">
    <div class="section-header">
      <h2>近期足迹</h2>
      <div class="section-line"></div>
      <div class="section-count" id="histCount"></div>
      <button class="bm-refresh" id="histRefresh" title="刷新">↻</button>
    </div>

    <div class="ins-controls">
      <span class="ins-controls-label">时间窗口</span>
      <select class="bm-select" id="histWindow">
        <option value="1">最近 24 小时</option>
        <option value="3">最近 3 天</option>
        <option value="7" selected>最近 7 天</option>
        <option value="30">最近 30 天</option>
        <option value="90">最近 90 天</option>
      </select>
      <span class="ins-controls-hint">从浏览器历史里看你最近真正在花时间看什么</span>
    </div>

    <!-- Top stats strip -->
    <section class="hist-stats" id="histStats"></section>

    <!-- Active filter chips (cell / domain) -->
    <div class="hist-filter-chips" id="histFilterChips" style="display:none"></div>

    <!-- 7×24 weekly heatmap — click any cell to drill down -->
    <section class="hist-block">
      <div class="hist-block-head">
        <h3>一周作息热力图</h3>
        <span class="hist-block-hint">行 = 星期，列 = 小时；点任一格 → 下方过滤到该时段</span>
      </div>
      <div class="hist-heatmap-wrap">
        <div class="hist-heatmap-status" id="histClockStatus"></div>
        <div class="hist-heatmap" id="histClock"></div>
        <div class="hist-heatmap-peaks" id="histPeakList"></div>
      </div>
    </section>

    <!-- Top domains -->
    <section class="hist-block">
      <div class="hist-block-head">
        <h3>高频域名</h3>
        <span class="hist-block-hint">点击域名查看它下面的页面</span>
      </div>
      <div class="hist-domains" id="histDomains"></div>
    </section>

    <!-- Top pages -->
    <section class="hist-block">
      <div class="hist-block-head">
        <h3>高频页面</h3>
        <span class="hist-block-hint">具体页面访问次数排名</span>
      </div>
      <div class="hist-pages" id="histPages"></div>
    </section>

    <div class="hist-status" id="histStatus"></div>
  </div>

  <!-- ================================================================
       随机回忆 — Random flashcard review of bookmarks
       Picks a weighted-random bookmark as a big card; you can open,
       delete, move it, or mark 已掌握/待回忆. Lazily loads bookmarks
       on first switch (see setActiveView in app.js).
       ================================================================ -->
  <div class="review-section view-pane" id="reviewSection" data-view="review">
    <div class="section-header">
      <h2>随机回忆</h2>
      <div class="section-line"></div>
      <div class="section-count" id="reviewCount"></div>
    </div>
    <div class="review-stage" id="reviewStage"><!-- big card injected by app.js --></div>
    <div class="review-empty" id="reviewEmpty" style="display:none">没有可回忆的书签，先去整理收藏夹吧。</div>
  </div>

  <!-- ================================================================
       FOOTER — global stats + refresh control
       ================================================================ -->
  <footer>
    <div class="footer-stats">
      <div class="stat">
        <div class="stat-num" id="statTabs">—</div>
        <div class="stat-label">Open tabs</div>
      </div>
    </div>
    <div class="last-refresh">
      <span class="credit credit-tabs" style="color: var(--muted); font-size: 11px;"><a href="https://github.com/zarazhangrui/tab-out" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Tab Out</a> by <a href="https://x.com/zarazhangrui" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Zara</a></span>
      <span class="credit credit-other" style="color: var(--muted); font-size: 11px;">by <a href="https://www.xiaohongshu.com/user/profile/654a536a000000000400a77e" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">饼饼几</a></span>
    </div>
  </footer>

</div><!-- end .container -->

<!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
<div class="toast" id="toast">
  <!-- Checkmark circle icon (Heroicons outline) -->
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<!-- Personal config (gitignored) — defines LOCAL_LANDING_PAGE_PATTERNS etc. -->
<!-- If the file doesn't exist, that's fine — app.js uses sensible defaults. -->
<script src="config.local.js" onerror="/* no personal config, that's fine */"></script>

<!-- Main dashboard logic — loads last so the DOM is ready -->
<script src="app.js"></script>
</body>
</html>
